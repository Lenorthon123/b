<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Dashboard Admin</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Dashboard Administrateur</h1>


<!-- LOGIN -->

<div id="login">

<input id="email"
placeholder="Email">

<input id="password"
type="password"
placeholder="Mot de passe">

<button onclick="login()">

Connexion

</button>

</div>



<!-- DASHBOARD -->

<div id="dashboard"
style="display:none;">

<button onclick="logout()"
class="logoutBtn">

Déconnexion

</button>

<h2>Répondants</h2>

<div id="nameList"
class="nameList">

<!-- Les noms apparaissent ici -->

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
