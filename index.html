<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Questionnaire Étude GPS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Questionnaire Étude GPS</h1>

<form id="surveyForm">

<!-- SECTION A -->

<h2>SECTION A — Profil</h2>

<label>Nom</label>
<input name="nom" required>

<label>Prénom</label>
<input name="prenom" required>

<label>Q1 — Commune de résidence</label>
<select name="commune">

<option>Yopougon</option>
<option>Abobo</option>
<option>Cocody</option>
<option>Marcory</option>
<option>Koumassi</option>
<option>Adjamé</option>
<option>Plateau</option>
<option>Treichville</option>
<option>Port-Bouët</option>
<option>Anyama</option>

</select>


<label>Q2 — Situation principale</label>
<select name="profil">

<option>Particulier</option>
<option>Moto-taxi</option>
<option>Commerçant</option>
<option>Entreprise / PME</option>
<option>Autre</option>

</select>


<label>Q3 — Mobile Money utilisé</label>
<select name="mobileMoney">

<option>Orange Money</option>
<option>MTN Money</option>
<option>Wave</option>
<option>Moov Money</option>

</select>


<!-- SECTION B -->

<h2>SECTION B — Problème</h2>

<label>Q4 — Avez-vous déjà subi un vol ?</label>
<select name="vol">

<option>Oui moi-même</option>
<option>Oui dans mon entourage</option>
<option>Non</option>

</select>


<label>Q5 — Quel bien a été volé ?</label>
<select name="typeBien">

<option>Téléphone</option>
<option>Moto</option>
<option>Voiture</option>
<option>Marchandises</option>
<option>Autre</option>

</select>


<label>Q6 — Niveau d'inquiétude face au vol</label>
<select name="inquietude">

<option>1 — Très faible</option>
<option>2 — Faible</option>
<option>3 — Moyen</option>
<option>4 — Élevé</option>
<option>5 — Très élevé</option>

</select>


<!-- SECTION C -->

<h2>SECTION C — Usage</h2>

<label>Q7 — Utilisez-vous déjà un GPS ?</label>
<select name="usage">

<option>Oui</option>
<option>Non</option>

</select>


<label>Q8 — Sur quels biens utiliseriez-vous un GPS ?</label>

<select name="usageType">

<option>Téléphone</option>
<option>Moto</option>
<option>Voiture</option>
<option>Marchandises</option>
<option>Enfant</option>

</select>


<label>Q9 — Où installer le GPS ?</label>
<select name="installation">

<option>Moi-même</option>
<option>Technicien</option>
<option>Peu importe</option>

</select>


<!-- SECTION D -->

<h2>SECTION D — Prix</h2>

<label>Q10 — Prix acceptable</label>
<select name="prix">

<option>5 000 — 10 000 FCFA</option>
<option>10 000 — 20 000 FCFA</option>
<option>20 000 — 30 000 FCFA</option>
<option>Plus de 30 000 FCFA</option>

</select>


<label>Q11 — Mode de paiement préféré</label>
<select name="paiement">

<option>Mobile Money</option>
<option>Espèces</option>
<option>Carte bancaire</option>

</select>


<label>Q12 — Abonnement mensuel acceptable</label>
<select name="abonnement">

<option>0 FCFA</option>
<option>500 FCFA</option>
<option>1 000 FCFA</option>
<option>Plus de 1 000 FCFA</option>

</select>


<!-- SECTION E -->

<h2>SECTION E — Distribution</h2>

<label>Q13 — Où acheteriez-vous ce produit ?</label>
<select name="canal">

<option>Boutique physique</option>
<option>En ligne</option>
<option>Agent Mobile Money</option>

</select>


<label>Q14 — Mode de livraison préféré</label>
<select name="livraison">

<option>Livraison à domicile</option>
<option>Retrait en boutique</option>

</select>


<label>Q15 — Support souhaité</label>
<select name="support">

<option>Téléphone</option>
<option>WhatsApp</option>
<option>Email</option>

</select>


<!-- SECTION F -->

<h2>SECTION F — Final</h2>

<label>Q16 — Seriez-vous prêt à utiliser ce produit ?</label>
<select name="intention">

<option>Oui immédiatement</option>
<option>Oui probablement</option>
<option>Peut-être plus tard</option>
<option>Non</option>

</select>


<label>Q17 — Combien de biens souhaitez-vous protéger ?</label>
<select name="biens">

<option>1</option>
<option>2 à 3</option>
<option>4 à 10</option>
<option>Plus de 10</option>

</select>


<label>Q18 — Numéro WhatsApp</label>
<input name="contact">


<button type="submit">

Envoyer le questionnaire

</button>

</form>

<p id="success" style="display:none;">

Merci pour votre réponse 🙏

</p>

</div>

<script src="script.js"></script>

</body>

</html>
