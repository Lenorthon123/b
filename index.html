<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Questionnaire GPS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Questionnaire Étude GPS</h1>

<form id="surveyForm">

<h2>SECTION A — Profil</h2>

<label>Nom</label>
<input name="nom" required>

<label>Prénom</label>
<input name="prenom" required>

<label>Q1 Commune</label>
<input name="commune">

<label>Q2 Situation principale</label>
<input name="profil">

<label>Q3 Mobile Money</label>
<input name="mobileMoney">


<h2>SECTION B — Problème</h2>

<label>Q4 Avez-vous déjà subi un vol ?</label>
<input name="vol">

<label>Q5 Quel type de bien ?</label>
<input name="typeBien">

<label>Q6 Niveau d'inquiétude</label>
<select name="inquietude">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>

</select>


<h2>SECTION C — Usage</h2>

<label>Q7 Utilisez-vous GPS ?</label>
<input name="usage">

<label>Q8 Quels usages ?</label>
<input name="usageType">

<label>Q9 Où installer ?</label>
<input name="installation">


<h2>SECTION D — Prix</h2>

<label>Q10 Prix acceptable</label>
<input name="prix">

<label>Q11 Paiement</label>
<input name="paiement">

<label>Q12 Abonnement</label>
<input name="abonnement">


<h2>SECTION E — Distribution</h2>

<label>Q13 Où acheter ?</label>
<input name="canal">

<label>Q14 Mode livraison</label>
<input name="livraison">

<label>Q15 Support souhaité</label>
<input name="support">


<h2>SECTION F — Final</h2>

<label>Q16 Intention</label>
<input name="intention">

<label>Q17 Nombre biens</label>
<input name="biens">

<label>Q18 Contact WhatsApp</label>
<input name="contact">

<button type="submit">

Envoyer

</button>

</form>

<p id="success" style="display:none;">

Merci pour votre réponse 🙏

</p>

</div>

<script src="script.js"></script>

</body>

</html>
